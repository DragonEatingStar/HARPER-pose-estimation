AUTO_RESUME: true
CUDNN:
  BENCHMARK: true
  DETERMINISTIC: false
  ENABLED: true
DATA_DIR: ''
GPUS: (0,)
OUTPUT_DIR: 'output'
LOG_DIR: 'log'
WORKERS: 0
PRINT_FREQ: 100

DATASET:
  DATASET: harper
  NUM_JOINTS_HALF_BODY: 13
  ROOT: 'data'
  TEST_SET: test
  TRAIN_SET: train
MODEL:
  INIT_WEIGHTS: true
  NAME: pose_litehrnet
  NUM_JOINTS: 21
  PRETRAINED: ''
  TARGET_TYPE: gaussian
  IMAGE_SIZE:
  - 256
  - 256
  HEATMAP_SIZE:
  - 64
  - 64
  SIGMA: 2
  EXTRA:
    stem:
      stem_channels: 32
      out_channels: 32
      expand_ratio: 1
    num_stages: 3
    stages_spec:
      num_modules: [2, 4, 2]
      num_branches: [2, 3, 4]
      num_blocks: [2, 2, 2]
      module_type: ['LITE', 'LITE', 'LITE']
      with_fuse: [True, True, True]
      reduce_ratios: [8, 8, 8]
      num_channels:
        - [40, 80]
        - [40, 80, 160]
        - [40, 80, 160, 320]
    with_head: False
LOSS:
  USE_TARGET_WEIGHT: true
TRAIN:
  BATCH_SIZE_PER_GPU: 32
  SHUFFLE: true
  BEGIN_EPOCH: 0
  END_EPOCH: 100
  OPTIMIZER: adam
  LR: 0.001
  LR_FACTOR: 0.1
  LR_STEP:
  - 170
  - 200
  WD: 0.0001
  GAMMA1: 0.99
  GAMMA2: 0.0
  MOMENTUM: 0.9
  NESTEROV: false
TEST:
  BATCH_SIZE_PER_GPU: 32
  MODEL_FILE: ''
  POST_PROCESS: true
DEBUG:
  DEBUG: false
  SAVE_BATCH_IMAGES_GT: true
  SAVE_BATCH_IMAGES_PRED: true
  SAVE_HEATMAPS_GT: true
  SAVE_HEATMAPS_PRED: true
  SAVE_3D_PLOTS: true
